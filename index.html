<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURATH | Arabic Heritage</title>
    <style>
        :root { --gold: #c5a059; --black: #000000; --soft-glow: rgba(197, 160, 89, 0.2); }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            margin: 0; 
            background-color: var(--black); 
            color: #ffffff; 
            font-family: 'Times New Roman', serif; 
        }

        /* Centered Header with Glow */
        header {
            padding: 40px 20px 20px;
            text-align: center;
            background: radial-gradient(circle at center, var(--soft-glow) 0%, rgba(0,0,0,0) 60%);
        }

        .logo-main {
            width: 120px; /* Small and elegant */
            height: auto;
            margin: 0 auto;
            display: block;
            /* Makes the logo feel part of the glow */
            filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.4));
        }

        h1 { 
            color: var(--gold); 
            letter-spacing: 8px; 
            font-size: 1.2rem; 
            margin: 15px 0 0; 
            font-weight: normal;
            text-transform: uppercase;
        }

        /* Navigation Bar */
        nav {
            margin: 20px 0;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 15px;
        }

        nav a { 
            color: #aaa; 
            text-decoration: none; 
            margin: 0 10px; 
            font-size: 0.7rem; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        /* Product Sections */
        .container { padding: 20px 5% 100px; }
        
        .section-title {
            color: var(--gold);
            text-align: left;
            letter-spacing: 3px;
            font-size: 1rem;
            margin: 50px 0 20px;
            text-transform: uppercase;
            border-left: 2px solid var(--gold);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            /* This makes it 2 columns on phone, 3 or 4 on computer */
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
        }

        .product-card {
            background: #080808;
            border: 1px solid #1a1a1a;
            padding: 10px;
            text-align: center;
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1; /* Keeps boxes square */
            background: #111;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: #444;
        }

        .product-card h3 {
            font-size: 0.8rem;
            margin: 10px 0 5px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .btn {
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px 12px;
            text-decoration: none;
            font-size: 0.6rem;
            display: inline-block;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Mobile specific adjustments */
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .logo-main { width: 160px; }
        }
    </style>
</head>
<body>

<header>
    <img src="Logo.png" alt="Turath" class="logo-main">
    <h1>TURATH</h1>
</header>

<nav>
    <a href="#thobes">Thobes</a>
    <a href="#perfumes">Perfumes</a>
    <a href="#accessories">Accessories</a>
</nav>

<div class="container">
    
    <h2 class="section-title" id="thobes">Thobes</h2>
    <div class="grid">
        <div class="product-card">
            <div class="product-img">Omani 32</div>
            <h3>Omani Collection</h3>
            <a href="#" class="btn">View</a>
        </div>
        <div class="product-card">
            <div class="product-img">Kuwaiti</div>
            <h3>Kuwaiti Style</h3>
            <a href="#" class="btn">View</a>
        </div>
    </div>

    <h2 class="section-title" id="perfumes">Perfumes</h2>
    <div class="grid">
        <div class="product-card">
            <div class="product-img">Oud Oil</div>
            <h3>Signature Oud</h3>
            <a href="#" class="btn">View</a>
        </div>
        <div class="product-card">
            <div class="product-img">Musk</div>
            <h3>Royal Musk</h3>
            <a href="#" class="btn">View</a>
        </div>
    </div>

    <h2 class="section-title" id="accessories">Accessories</h2>
    <div class="grid">
        <div class="product-card">
            <div class="product-img">Shemagh</div>
            <h3>Fine Headwear</h3>
            <a href="#" class="btn">View</a>
        </div>
    </div>

</div>

<footer style="text-align:center; color:#333; font-size:0.7rem; padding-bottom:50px;">
    &copy; 2026 TURATH HERITAGE
</footer>

</body>
</html>
