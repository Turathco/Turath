<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURATH | Wear Your Heritage</title>
    <style>
        :root { --gold: #c5a059; --black: #0d0d0d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--black); 
            color: white; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        }

        /* Top Navigation Bar - Matches the Shopify look */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5%;
            background: var(--black);
            border-bottom: 1px solid #222;
        }

        .nav-logo {
            height: 50px; /* Small and elegant on the left */
            width: auto;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Large Hero Image Section */
        .hero {
            position: relative;
            height: 80vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1519011985187-444d62641929?q=80&w=2000'); /* Placeholder image */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 60px 5%;
        }

        .hero-text {
            max-width: 600px;
        }

        .hero-text p {
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .hero-text h1 {
            font-size: 3rem;
            font-weight: 500;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        /* Product Sections */
        .section-padding { padding: 60px 5%; }
        .section-title { 
            font-size: 1.5rem; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
            .hero-text h1 { font-size: 4.5rem; }
        }

        .card { text-align: left; }
        .card-img {
            width: 100%;
            aspect-ratio: 3/4;
            background: #1a1a1a;
            margin-bottom: 10px;
            border: 1px solid #222;
        }
        .card h3 { font-size: 0.9rem; font-weight: normal; margin-bottom: 5px; }
        .card p { color: var(--gold); font-size: 0.85rem; }

        .btn-white {
            background: white;
            color: black;
            padding: 12px 30px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<nav>
    <img src="Logo.png" alt="Turath" class="nav-logo">
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#catalog">Catalog</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-text">
        <p>Welcome Industry Insiders</p>
        <h1>Wear Your Heritage.</h1>
        <a href="#catalog" class="btn-white">Shop Collections</a>
    </div>
</section>

<div class="section-padding" id="catalog">
    <h2 class="section-title">Turath Collections</h2>
    <div class="product-grid">
        <div class="card">
            <div class="card-img"></div>
            <h3>Omani Thobe</h3>
            <p>View Collection</p>
        </div>
        <div class="card">
            <div class="card-img"></div>
            <h3>Kuwaiti Dishdasha</h3>
            <p>View Collection</p>
        </div>
        <div class="card">
            <div class="card-img"></div>
            <h3>Signature Perfumes</h3>
            <p>Discover Scents</p>
        </div>
        <div class="card">
            <div class="card-img"></div>
            <h3>Accessories</h3>
            <p>Shop Now</p>
        </div>
    </div>
</div>

<footer style="padding: 40px 5%; border-top: 1px solid #222; color: #555; font-size: 0.8rem;">
    &copy; 2026 TURATH. All Rights Reserved.
</footer>

</body>
</html>
